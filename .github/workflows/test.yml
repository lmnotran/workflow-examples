name: Test

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential
    
    - name: Create build directory
      run: mkdir build
    
    - name: Configure CMake
      run: |
        cd build
        cmake ..
    
    - name: Build project
      run: |
        cd build
        make
    
    - name: Run tests
      run: |
        cd build
        ctest --verbose
    
    - name: Run test executable directly (for additional verification)
      run: |
        cd build
        ./test_addition